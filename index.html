<!DOCTYPE html>
<html>
    <head>
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>Weather App</h1>
        <input type="text" id="inputCity" placeholder="Enter a City">
        <button id="getData">Get Weather</button>

        <div id="weather">
            <img id="weatherIcon">
            <h2 id="cityName"></h2>
            <p id="cityTemp"></p>
            <p id="condition"></p>
        </div>

        <script src="script.js"></script>
    </body>
</html>
